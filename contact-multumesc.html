<!DOCTYPE html>
<html lang="ro">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Solicitare trimisă | Gherasim Marius</title>

<meta name="description"
content="Solicitarea a fost trimisă cu succes. Vei fi contactat în cel mai scurt timp.">

<link rel="stylesheet" href="style.css">

<style>

.thankyou-page{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
    background:#f5f7fb;
}

.thankyou-card{
    max-width:700px;
    width:100%;
    background:#fff;
    padding:50px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    text-align:center;
}

.success-icon{
    font-size:70px;
    margin-bottom:20px;
}

.thankyou-card h1{
    color:#0F2B5B;
    margin-bottom:20px;
}

.thankyou-card p{
    font-size:18px;
    line-height:1.7;
    color:#444;
    margin-bottom:20px;
}

.btn-group{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
    margin-top:30px;
}

.btn-primary{
    background:#F28C28;
    color:#fff;
    padding:14px 28px;
    border-radius:10px;
    text-decoration:none;
    font-weight:600;
    transition:.3s;
}

.btn-primary:hover{
    transform:translateY(-2px);
}

.btn-secondary{
    background:#0F2B5B;
    color:#fff;
    padding:14px 28px;
    border-radius:10px;
    text-decoration:none;
    font-weight:600;
    transition:.3s;
}

.btn-secondary:hover{
    transform:translateY(-2px);
}

.contact-info{
    margin-top:30px;
    padding-top:25px;
    border-top:1px solid #eee;
}

.contact-info strong{
    color:#0F2B5B;
}

@media(max-width:768px){

.thankyou-card{
    padding:35px 25px;
}

.thankyou-card h1{
    font-size:28px;
}

.thankyou-card p{
    font-size:16px;
}

}

</style>

</head>

<body>

<div class="thankyou-page">

    <div class="thankyou-card">

        <div class="success-icon">
            ✅
        </div>

        <h1>Solicitarea a fost trimisă cu succes!</h1>

        <p>Îți mulțumesc pentru mesaj.</p>
        <p>Voi reveni către tine în cel mai scurt timp.</p>

        <div class="btn-group">

            <a href="https://wa.me/40759012119"
               target="_blank"
               class="btn-primary">
               Discută pe WhatsApp
            </a>

            <a href="index.html"
               class="btn-secondary">
               Înapoi la site
            </a>

        </div>

        <div class="contact-info">

            <p>
                <strong>Telefon:</strong> 0759 012 119
            </p>

            <p>
                <strong>Email:</strong> office@gherasimmarius.com
            </p>

        </div>

    </div>

</div>

<!-- Google Analytics -->

</body>
</html>
